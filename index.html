<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<!-- Anticaché: todos los archivos internos (JS, CSS, JSON, imágenes) ya se piden
     con ?v=VERSION, así que se renuevan solos en cuanto sube el número de
     versión. Esto de aquí es solo para este mismo archivo (index.html): sin
     esto, algunos navegadores (sobre todo Chrome en móvil) se quedan con una
     copia vieja de la página en caché y hace falta modo incógnito para verla
     actualizada. Con esto, cada vez que se abre la página se comprueba si hay
     una versión nueva en el servidor en vez de fiarse de la copia guardada. -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Cripta</title>
<link rel="stylesheet" href="./css/styles.css?v=0.14.3">
</head>
<body>
<div id="game">
  <canvas id="map"></canvas>

  <!-- HUD (arriba-izquierda). Tocar la fila superior recentra la cámara. -->
  <div class="ui hud" id="hud">
    <div class="hudrow" id="hudRow">
      <div class="heroPanel" id="heroPanel">
        <div class="hp-row1">
          <span class="heroName" id="heroName2"></span>
          <span class="statusRow" id="heroStatus"></span>
        </div>
        <div class="hp-row2">
          <div class="bar hero"><span class="fill" id="hpHero" style="width:100%"></span><span class="hptext" id="hpHeroText"></span></div>
        </div>
        <div class="hp-row3">
          <div class="bar mana"><span class="fill" id="manaFill" style="width:100%"></span><span class="hptext" id="manaText"></span></div>
        </div>
        <div class="pa-box" id="apPips"></div>
      </div>
      <div class="stat"><img class="goldIcon" src="./assets/ui/gold_icon.png" alt=""> <b id="gold">0</b></div>
    </div>
    <button class="skipturn" id="endTurn"></button>
    <div class="foeRow" id="foeRow"></div>
  </div>

  <!-- Aviso de combate + orden de iniciativa (arriba-derecha; antes aquí
       estaba el botón de reiniciar, movido al panel de ajustes) -->
  <div class="ui topright" id="topright">
    <div class="combatBadge" id="combatBadge">⚔️</div>
    <div class="initiativeBar" id="initiativeBar"></div>
  </div>

  <!-- Versión + Ajustes + recentrar (abajo-derecha) -->
  <div class="ui bottomright" id="bottomright">
    <div class="vertag" id="verTag"></div>
    <div class="fabcol">
      <button class="fab" id="gridBtn" aria-label="Rejilla">▦</button>
      <button class="fab" id="settingsBtn" aria-label="Ajustes">⚙</button>
      <button class="fab" id="recenter" aria-label="Centrar">⌖</button>
    </div>
  </div>

  <!-- Registro (abajo-izquierda) -->
  <div class="ui log" id="log"></div>

  <!-- Panel de ajustes -->
  <div class="veil" id="settingsVeil">
    <div class="panel">
      <h2 id="setTitle"></h2>

      <label id="setLangLabel"></label>
      <div class="langrow">
        <button class="langbtn" data-lang="es">ES</button>
        <button class="langbtn" data-lang="en">EN</button>
      </div>

      <label id="setScaleLabel"></label>
      <input type="range" id="uiScale" min="0.8" max="1.6" step="0.05" value="1">

      <label id="setMusicLabel"></label>
      <input type="range" id="musicVol" min="0" max="1" step="0.05" value="0.6">

      <label id="setFxLabel"></label>
      <input type="range" id="fxVol" min="0" max="1" step="0.05" value="0.7">

      <button class="primary" id="repositionBtn"></button>

      <button class="primary" id="reset" aria-label="Reiniciar"></button>

      <button class="primary" id="setClose"></button>
      <div class="ver" id="verTagPanel"></div>
    </div>
  </div>

  <!-- Botón flotante que ancla la interfaz en su sitio al reposicionarla. -->
  <button class="layoutApplyBtn" id="layoutApplyBtn"></button>

  <!-- Carta de evento -->
  <div class="veil" id="veil"><div class="card" id="card"></div></div>

  <!-- Pantalla de novedades al arrancar. El botón Continuar queda anclado arriba
       (no scrollea) y hace de primer toque para activar el sonido. -->
  <div class="splash show" id="splash">
    <div class="splash-head">
      <button class="primary" id="splashContinue"></button>
      <div class="splash-title" id="splashTitle"></div>
    </div>
    <div class="splash-body" id="splashBody"></div>
  </div>
</div>

<script type="module" src="./js/main.js?v=0.14.3"></script>
</body>
</html>
