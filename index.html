<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Cripta — Táctico + Eventos</title>
<link rel="stylesheet" href="./css/styles.css">
</head>
<body>
<div class="frame">

  <div class="hud">
    <div class="who"><span class="name">Mercenaria</span>
      <div class="bar hero"><span id="hpHero" style="width:100%"></span></div></div>
    <div class="who"><span class="name">Acechador</span>
      <div class="bar foe"><span id="hpFoe" style="width:100%"></span></div></div>
    <div class="stat">◆ <b id="gold">0</b></div>
  </div>

  <!-- Mapa cenital: canvas 2D. La capa de dibujo vive en js/render.js -->
  <div id="game">
    <canvas id="map"></canvas>
    <!-- Carta de evento: HTML puro sobre el mapa. Se rellena desde js/ui.js -->
    <div class="veil" id="veil"><div class="card" id="card"></div></div>
  </div>

  <div class="log" id="log">Cargando…</div>

  <div class="foot">
    <small>Canvas 2D en el mapa · HTML/CSS en las cartas</small>
    <button class="reset" id="reset">Reiniciar</button>
  </div>
</div>

<!-- Punto de entrada. type="module" habilita import/export nativos. -->
<script type="module" src="./js/main.js"></script>
</body>
</html>
